# ════════════════════════════════════════════════════════════════
#  QuantBot Infra — Docker Compose Orchestration
#  10-Container Institutional Trading Infrastructure
# ════════════════════════════════════════════════════════════════
version: '3.8'

networks:
  quantbot-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pgdata:
    driver: local
  redis-data:
    driver: local
  hummingbot-data:
    driver: local
  research-data:
    driver: local
  ml-models:
    driver: local
  logs:
    driver: local

services:
  # ── 1. Nginx Reverse Proxy ──────────────────────────
  nginx:
    build: ./nginx
    container_name: qb-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      core-engine:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.10
    restart: unless-stopped

  # ── 2. Frontend Dashboard (Next.js) ─────────────────
  frontend:
    build: ./services/frontend
    container_name: qb-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://127.0.0.1
      - NODE_ENV=production
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.11
    restart: unless-stopped

  # ── 3. Core Engine (FastAPI) ────────────────────────
  core-engine:
    build: ./services/core-engine
    container_name: qb-core-engine
    env_file: .env
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - DEMO_MODE=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - logs:/app/logs
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.20
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── 4. Hummingbot Execution Engine ──────────────────
  hummingbot:
    build: ./services/hummingbot
    container_name: qb-hummingbot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      core-engine:
        condition: service_healthy
    volumes:
      - hummingbot-data:/app/data
      - logs:/app/logs
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.30
    restart: unless-stopped

  # ── 6. Quant Research Lab ───────────────────────────
  quant-research:
    build: ./services/quant-research
    container_name: qb-quant-research
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - research-data:/app/data
      - logs:/app/logs
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.32
    restart: unless-stopped

  # ── 7. Machine Learning Engine ──────────────────────
  ml-engine:
    build: ./services/ml-engine
    container_name: qb-ml-engine
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ml-models:/app/models
      - logs:/app/logs
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.33
    restart: unless-stopped

  # ── 8. PostgreSQL Database ──────────────────────────
  postgres:
    build: ./services/database
    container_name: qb-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-quantbot}
      - POSTGRES_USER=${POSTGRES_USER:-quantbot_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/database/init:/docker-entrypoint-initdb.d
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.40
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantbot_user} -d ${POSTGRES_DB:-quantbot}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 9. Redis Cache ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qb-redis
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-change_me_redis} --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.41
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 11. Grafana (Dashboard) ─────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: qb-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.51
    restart: unless-stopped

  # ── 12. Loki (Log Aggregation) ──────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: qb-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.52
    restart: unless-stopped

  # ── 13. Promtail (Log Collector) ────────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: qb-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./loki/promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      quantbot-net:
        ipv4_address: 172.28.0.53
    depends_on:
      - loki
    restart: unless-stopped
